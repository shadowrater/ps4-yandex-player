name: Build PS4 Homebrew

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: repo

    - name: Install dependencies
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo -S -p '' apt-key add -
        sudo -S -p '' add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main"
        sudo -S -p '' apt-get update
        sudo -S -p '' apt-get install -y clang-18 lld-18 llvm-18 python3 curl tar
        sudo -S -p '' update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
        sudo -S -p '' update-alternatives --install /usr/bin/lld lld /usr/bin/lld-18 100
        sudo -S -p '' update-alternatives --install /usr/bin/llvm-strip llvm-strip /usr/bin/llvm-strip-18 100
        clang --version

    - name: Download OpenOrbis SDK
      run: |
        SDK_VERSION="v0.5.4"
        curl -L "https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/${SDK_VERSION}/toolchain-llvm-18.tar.gz" -o sdk.tar.gz
        mkdir -p $HOME/orbis-sdk
        tar -xzf sdk.tar.gz -C $HOME/orbis-sdk
        mv $HOME/orbis-sdk/OpenOrbis/PS4Toolchain/* $HOME/orbis-sdk/ 2>/dev/null || true
        rm -rf $HOME/orbis-sdk/OpenOrbis
        ls $HOME/orbis-sdk/

    - name: Create toolchain wrappers
      run: |
        SDK=$HOME/orbis-sdk
        mkdir -p $SDK/bin/linux
        printf '#!/bin/bash\nexec clang-18 -target x86_64-pc-freebsd-elf -mno-red-zone -fms-extensions -fno-exceptions -fno-rtti -ffreestanding -fPIC "$@"\n' > $SDK/bin/linux/orbis-clang
        chmod +x $SDK/bin/linux/orbis-clang
        printf '#!/bin/bash\nexec llvm-strip-18 "$@"\n' > $SDK/bin/linux/orbis-strip
        chmod +x $SDK/bin/linux/orbis-strip
        $SDK/bin/linux/orbis-clang --version

    - name: Build project
      run: |
        export OO_PS4_TOOLCHAIN=$HOME/orbis-sdk
        export PATH=$HOME/orbis-sdk/bin/linux:$PATH
        cd repo/ps4-yandex-player
        ls src/
        make info || true
        make clean || true
        make all 2>&1
        ls -la build/ 2>/dev/null || echo "No build dir"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: YandexMusicPlayer-PS4
        path: repo/ps4-yandex-player/build/
        retention-days: 30
