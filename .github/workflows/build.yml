name: Build PS4 Homebrew

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build in Docker
      uses: addnab/docker-run-action@v3
      with:
        image: openorbisofficial/toolchain:latest
        options: -v ${{ github.workspace }}:/build
        run: |
          cd /build
          echo "SDK: $OO_PS4_TOOLCHAIN"
          ls $OO_PS4_TOOLCHAIN/bin/ || echo "SDK bin not found"
          make clean
          make all
    
    - name: List artifacts
      run: ls -la ps4-yandex-player/build/
    
    - name: Upload PKG
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: YandexMusicPlayer-PS4
        path: ps4-yandex-player/build/*.pkg
        retention-days: 30
