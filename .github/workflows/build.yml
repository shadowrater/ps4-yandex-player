name: Build PS4 Homebrew

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: repo
    
    - name: Build in Docker
      run: |
        docker run --rm \
          -v "${{ github.workspace }}/repo:/src:ro" \
          openorbisofficial/toolchain:latest \
          bash -c "
            set -e
            echo '=== Environment ==='
            echo \"SDK: \$OO_PS4_TOOLCHAIN\"
            
            echo '=== SDK Tools ==='
            ls \$OO_PS4_TOOLCHAIN/bin/linux/ 2>/dev/null || echo 'No linux bin dir'
            
            echo '=== Source Files ==='
            ls /src/src/
            
            echo '=== Testing Compiler ==='
            \$OO_PS4_TOOLCHAIN/bin/linux/orbis-clang --version
            
            echo '=== Copying source ==='
            cp -r /src /tmp/build
            cd /tmp/build
            
            echo '=== Building ==='
            SDK_PATH=\$OO_PS4_TOOLCHAIN make clean || true
            SDK_PATH=\$OO_PS4_TOOLCHAIN make all
            
            echo '=== Build Complete ==='
            ls -la build/
          "
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: YandexMusicPlayer-PS4
        path: repo/build/*.pkg
        retention-days: 30
