name: Build PS4 Homebrew

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Test Docker image
      run: |
        docker run --rm openorbisofficial/toolchain:latest echo "Docker works"
    
    - name: Check SDK in Docker
      run: |
        docker run --rm openorbisofficial/toolchain:latest bash -c "
          echo 'SDK Path: \$OO_PS4_TOOLCHAIN'
          ls -la \$OO_PS4_TOOLCHAIN/
          ls \$OO_PS4_TOOLCHAIN/bin/linux/ || echo 'No linux bin'
        "
    
    - name: Copy source to Docker and build
      run: |
        docker run --rm \
          -v "\${{ github.workspace }}:/workspace:ro" \
          -w /tmp \
          openorbisofficial/toolchain:latest \
          bash -c "
            # Copy source
            cp -r /workspace /tmp/build
            cd /tmp/build
            
            # Show SDK
            echo '=== SDK ==='
            echo \"SDK: \$OO_PS4_TOOLCHAIN\"
            ls \$OO_PS4_TOOLCHAIN/bin/linux/ || echo 'No linux bin'
            
            # Try to compile one file
            echo '=== Testing compile ==='
            \$OO_PS4_TOOLCHAIN/bin/linux/orbis-clang --version || echo 'orbis-clang not found'
            
            # List source files
            echo '=== Source files ==='
            ls -la src/
          "
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: /tmp/build-logs/
