name: Build PS4 Homebrew

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build with Docker
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          openorbisofficial/toolchain:latest \
          bash -c "
            echo 'SDK: \$OO_PS4_TOOLCHAIN'
            ls \$OO_PS4_TOOLCHAIN/bin/ || echo 'SDK bin not found'
            cd /workspace
            make clean || true
            make all
          "
    
    - name: List artifacts
      run: |
        echo "Build output:"
        ls -la ps4-yandex-player/build/ 2>/dev/null || echo "No build directory"
    
    - name: Upload PKG
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: YandexMusicPlayer-PS4
        path: ps4-yandex-player/build/*.pkg
        retention-days: 30
